[pytest]
# Used when pytest is started with cwd = ``hare/`` (no ``pyproject.toml`` here).
testpaths = tests
pythonpath = ..
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    asyncio: async test (needs pytest-asyncio)
    unit: fast unit test — no network, no subprocess, no filesystem writes
    integration: test that uses subprocesses, real filesystem, or network
    slow: test that takes >5 seconds
    alignment: behavioral test comparing hare output against TS reference
    live: opt-in end-to-end test against a real model backend (HARE_LIVE_TESTS=1)
