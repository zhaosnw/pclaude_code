repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
        language_version: python3
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-imports
        name: Validate hare imports
        entry: python scripts/validate_imports.py
        language: python
        pass_filenames: false
        additional_dependencies: []
        types: [python]

      - id: detect-stubs
        name: Detect stub/TODO regressions
        entry: python scripts/detect_stubs.py
        language: python
        pass_filenames: false
        additional_dependencies: []
        types: [python]

      - id: check-alignment
        name: Check alignment regressions
        entry: python scripts/check_alignment_regressions.py
        language: python
        pass_filenames: false
        additional_dependencies: []
