name: Live model smoke

# Opt-in end-to-end smoke against a REAL model backend. Costs tokens and is
# nondeterministic, so it is NOT part of the per-PR pipeline:
#   - workflow_dispatch: run on demand from the Actions tab
#   - schedule: a weekly heartbeat so regressions vs a live backend are caught
# Requires repo/environment secrets; if they're absent the job no-ops (so forks
# and secret-less setups don't fail).
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  live-smoke:
    name: "Live smoke (real model)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic]"

      - name: Check secrets present
        id: gate
        env:
          TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$TOKEN" ] || [ -n "$KEY" ]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No model credentials configured (ANTHROPIC_AUTH_TOKEN/ANTHROPIC_API_KEY secret) — skipping live smoke."
          fi

      - name: Run live smoke
        if: steps.gate.outputs.have_creds == 'true'
        env:
          HARE_LIVE_TESTS: "1"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          API_TIMEOUT_MS: "120000"
        run: |
          python -m pytest tests/live/ -v --tb=short --timeout=200
