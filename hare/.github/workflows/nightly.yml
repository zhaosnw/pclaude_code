name: Nightly Alignment Audit

on:
  schedule:
    - cron: "19 7 * * *"  # 07:19 UTC daily
  workflow_dispatch:

jobs:
  nightly-full:
    name: "Nightly full alignment (P0+P1+P2)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hare/pyproject.toml

      - name: Install deps
        working-directory: hare
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,anthropic]"

      - name: Run Python oracle (P0+P1+P2)
        working-directory: hare
        run: python scripts/alignment_runner.py --priority P0,P1,P2 --out /tmp/py-alignment.jsonl

      - name: Compare full
        run: |
          python hare/scripts/compare_alignment.py \
            --ts /dev/null --py /tmp/py-alignment.jsonl \
            --priority P0,P1,P2 \
            --report alignment-full.json --md alignment-full.md

      - name: P0/P1 coverage gate
        working-directory: hare
        run: python scripts/coverage_p0p1_gate.py --coverage-xml coverage.xml --min-line 0.70 --min-branch 0.60
        continue-on-error: true

      - name: Run property tests
        working-directory: hare
        run: python -m pytest tests/property/ -v --tb=short 2>/dev/null || echo "Property tests not yet set up"
        continue-on-error: true

      - name: Size diff audit
        working-directory: hare
        run: python scripts/audit_sizediff.py

      - name: Priority stub audit
        working-directory: hare
        run: python scripts/detect_stubs_priority.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-alignment
          path: |
            /tmp/py-alignment.jsonl
            alignment-full.json
            alignment-full.md
            audit/sizediff.csv
          if-no-files-found: ignore

  trend-upload:
    name: "Upload trend data"
    runs-on: ubuntu-latest
    needs: nightly-full
    if: always()
    steps:
      - name: "Placeholder for trend dashboard upload"
        run: echo "Nightly trend collect — connect to dashboard"
